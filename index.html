<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>MONOTONE · Laser Forensics</title>
  <style>
    /* ---------- Reset & base ---------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
      background: #0b0d14;
      overflow: hidden;
      font-family: 'Courier New', 'Segoe UI', monospace;
      color: #c8d0e0;
      user-select: none;
    }

    /* ---------- Main canvas ---------- */
    #wrap {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 1;
    }
    video { display: none; }
    canvas#cv {
      max-width: 100vw;
      max-height: 100vh;
      background: #0b0d14;
      display: block;
      border-radius: 8px;
      box-shadow: 0 0 40px rgba(0, 180, 255, 0.08);
    }

    /* ---------- Grid overlay (CSS only, for style) ---------- */
    #wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 180, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 180, 255, 0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 2;
      border-radius: 8px;
    }

    /* ---------- Top dashboard ---------- */
    #dashboard {
      position: fixed;
      top: 16px;
      left: 16px;
      right: 16px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      z-index: 10;
      pointer-events: none;
    }
    #dashboard > * {
      pointer-events: auto;
    }
    .panel {
      background: rgba(12, 16, 28, 0.82);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 180, 255, 0.15);
      border-radius: 10px;
      padding: 6px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.6);
    }
    .panel-left {
      flex: 1 1 auto;
      min-width: 200px;
    }
    .panel-right {
      flex: 0 1 auto;
      gap: 6px;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #0cf;
      text-shadow: 0 0 20px rgba(0, 204, 255, 0.3);
      margin-right: 4px;
    }
    .logo small {
      font-size: 12px;
      color: #6a7a8a;
      letter-spacing: 1px;
      font-weight: 300;
    }

    .ctrl-group {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: #8a9aaa;
    }
    .ctrl-group label {
      white-space: nowrap;
      letter-spacing: 0.5px;
    }
    select, button {
      background: rgba(0, 180, 255, 0.06);
      border: 1px solid rgba(0, 180, 255, 0.15);
      color: #c8d0e0;
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
      transition: 0.2s;
      font-family: inherit;
    }
    select:hover, button:hover {
      background: rgba(0, 180, 255, 0.12);
      border-color: #0cf;
      color: #fff;
    }
    select:focus, button:focus {
      outline: none;
      border-color: #0cf;
      box-shadow: 0 0 12px rgba(0, 204, 255, 0.15);
    }
    .toggle {
      background: rgba(0, 204, 255, 0.08);
      border-color: rgba(0, 204, 255, 0.2);
    }
    .toggle.active {
      background: rgba(0, 204, 255, 0.15);
      border-color: #0cf;
      box-shadow: 0 0 12px rgba(0, 204, 255, 0.15);
    }
    .badge {
      font-size: 10px;
      color: #5a6a7a;
      padding: 2px 10px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.04);
      letter-spacing: 0.5px;
    }
    #fps {
      min-width: 60px;
      text-align: center;
    }

    /* ---------- Error overlay ---------- */
    #err {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      text-align: center;
      padding: 20px;
      background: rgba(0,0,0,0.85);
      z-index: 30;
    }
    #err h2 { color: #ff4466; font-weight: 300; letter-spacing: 2px; }
    #err p { color: #889; margin-top: 8px; font-size: 14px; }

    /* ---------- Responsive ---------- */
    @media (max-width: 720px) {
      #dashboard { top: 8px; left: 8px; right: 8px; gap: 6px; }
      .panel { padding: 4px 10px; gap: 6px; border-radius: 8px; }
      .logo { font-size: 16px; }
      .ctrl-group { font-size: 10px; }
      select, button { font-size: 9px; padding: 2px 6px; }
      .badge { font-size: 8px; padding: 1px 6px; }
    }
  </style>
</head>
<body>

  <!-- ====== MAIN WRAPPER ====== -->
  <div id="wrap">
    <video id="cam" playsinline></video>
    <canvas id="cv"></canvas>
  </div>

  <!-- ====== DASHBOARD ====== -->
  <div id="dashboard">
    <div class="panel panel-left">
      <span class="logo"> MONOTONE <small>forensics</small></span>
      <div class="ctrl-group">
        <label for="beamColor">Beam color</label>
        <select id="beamColor">
          <option value="shape">Shape‑shift</option>
          <option value="cyan" selected>Cyan</option>
          <option value="magenta">Magenta</option>
          <option value="lime">Lime</option>
          <option value="gold">Gold</option>
        </select>
      </div>
      <div class="ctrl-group">
        <label for="beamStyle">Style</label>
        <select id="beamStyle">
          <option value="glow" selected>Glow</option>
          <option value="solid">Solid</option>
          <option value="dashed">Dashed</option>
          <option value="neon">Neon</option>
        </select>
      </div>
    </div>
    <div class="panel panel-right">
      <div class="ctrl-group">
        <button id="toggleParticles" class="toggle active">✦ Particles</button>
        <button id="toggleSkeleton" class="toggle active">☰ Skeleton</button>
        <button id="snapshotBtn">📷 Snap</button>
      </div>
      <span class="badge" id="fps">FPS: --</span>
    </div>
  </div>

  <!-- ====== ERROR ====== -->
  <div id="err"><div><h2>⚠ Camera error</h2><p id="errmsg"></p></div></div>

  <!-- ====== SCRIPT ====== -->
  <script type="importmap">
    {
      "imports": {
        "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs"
      }
    }
  </script>

  <script type="module">
    // ================================================================
    //  MONOTONE · Laser Forensics (laser‑only mode)
    //  - Dual‑hand laser beams between extended fingertips
    //  - Beam color & style options
    //  - Particles, skeleton toggle, snapshot
    //  - Forensic / police aesthetic with grid overlay
    // ================================================================

    import { HandLandmarker, FilesetResolver } from "@mediapipe/tasks-vision";

    // ---- DOM refs ----
    const video = document.getElementById('cam');
    const cv = document.getElementById('cv');
    const ctx = cv.getContext('2d');
    const beamColorSelect = document.getElementById('beamColor');
    const beamStyleSelect = document.getElementById('beamStyle');
    const toggleParticlesBtn = document.getElementById('toggleParticles');
    const toggleSkeletonBtn = document.getElementById('toggleSkeleton');
    const snapshotBtn = document.getElementById('snapshotBtn');
    const fpsEl = document.getElementById('fps');

    // ---- Constants ----
    const TIPS = [4, 8, 12, 16, 20];
    const PIPS = { 4: 3, 8: 6, 12: 10, 16: 14, 20: 18 };
    const HAND_CONNECTIONS = [
      [0,1],[1,2],[2,3],[3,4],
      [0,5],[5,6],[6,7],[7,8],
      [5,9],[9,10],[10,11],[11,12],
      [9,13],[13,14],[14,15],[15,16],
      [13,17],[17,18],[18,19],[19,20],
      [0,17]
    ];

    // ---- State ----
    let landmarker = null;
    let colorMode = 'cyan';      // 'shape', 'cyan', 'magenta', 'lime', 'gold'
    let beamStyle = 'glow';      // 'glow', 'solid', 'dashed', 'neon'
    let showParticles = true;
    let showSkeleton = true;

    // ---- Particle system ----
    let particles = [];
    const MAX_PARTICLES = 500;

    class Particle {
      constructor(x, y, hue) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 2.5;
        this.vy = (Math.random() - 0.5) * 2.5 - 1.2;
        this.life = 1.0;
        this.decay = 0.006 + Math.random() * 0.014;
        this.size = 2 + Math.random() * 5;
        this.hue = hue + (Math.random() - 0.5) * 25;
        this.sat = 85 + Math.random() * 15;
        this.light = 60 + Math.random() * 30;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.035;
        this.life -= this.decay;
        this.size *= 0.995;
      }
      draw(ctx) {
        const alpha = this.life * 0.75;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = `hsl(${this.hue}, ${this.sat}%, ${this.light}%)`;
        ctx.shadowColor = `hsla(${this.hue}, 100%, 70%, ${alpha * 0.5})`;
        ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.arc(this.x, this.y, Math.max(0.4, this.size), 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
      }
      get dead() { return this.life <= 0 || this.size < 0.3; }
    }

    // ---- Helpers ----
    function extendedFingers(lm) {
      const wx = lm[0].x, wy = lm[0].y;
      const dist = (p) => Math.hypot(p.x - wx, p.y - wy);
      const out = {};
      for (const t of TIPS) {
        out[t] = dist(lm[t]) > dist(lm[PIPS[t]]) * 1.05;
      }
      return out;
    }

    function handShapeHue(lm) {
      const palm = Math.hypot(lm[0].x - lm[9].x, lm[0].y - lm[9].y) || 1;
      let sum = 0, n = 0;
      for (let i = 0; i < TIPS.length; i++) {
        for (let j = i+1; j < TIPS.length; j++) {
          sum += Math.hypot(lm[TIPS[i]].x - lm[TIPS[j]].x, lm[TIPS[i]].y - lm[TIPS[j]].y);
          n++;
        }
      }
      const spread = (sum / n) / palm;
      let curl = 0;
      for (const t of TIPS) curl += Math.hypot(lm[t].x - lm[0].x, lm[t].y - lm[0].y) / palm;
      curl /= TIPS.length;
      return ((spread * 180 + curl * 60) % 360 + 360) % 360;
    }

    function getBeamHue(shapeHue) {
      switch (colorMode) {
        case 'cyan':    return 180;
        case 'magenta': return 300;
        case 'lime':    return 120;
        case 'gold':    return 50;
        default:        return shapeHue; // 'shape'
      }
    }

    // ---- Drawing functions ----
    function drawBeam(x1, y1, x2, y2, hue, width, alpha = 1) {
      const h = getBeamHue(hue);
      const style = beamStyle;
      ctx.save();
      ctx.lineCap = 'round';

      if (style === 'glow' || style === 'neon') {
        // Outer glow
        ctx.strokeStyle = `hsla(${h}, 100%, 70%, ${0.15 * alpha})`;
        ctx.lineWidth = width + 16;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
        // Mid glow
        ctx.strokeStyle = `hsla(${h}, 100%, 70%, ${0.3 * alpha})`;
        ctx.lineWidth = width + 8;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
        // Core
        ctx.strokeStyle = `hsla(${h}, 100%, 80%, ${alpha})`;
        ctx.lineWidth = width;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
        if (style === 'neon') {
          ctx.strokeStyle = `rgba(255,255,255,${0.3 * alpha})`;
          ctx.lineWidth = Math.max(1, width / 3);
          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.stroke();
        }
      } else if (style === 'solid') {
        ctx.strokeStyle = `hsla(${h}, 100%, 75%, ${alpha})`;
        ctx.lineWidth = width;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
      } else if (style === 'dashed') {
        ctx.setLineDash([8, 8]);
        ctx.strokeStyle = `hsla(${h}, 100%, 75%, ${alpha})`;
        ctx.lineWidth = width;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      // Bright dot at origin
      ctx.fillStyle = `hsla(${h}, 100%, 90%, ${alpha})`;
      ctx.shadowColor = `hsla(${h}, 100%, 70%, ${0.5 * alpha})`;
      ctx.shadowBlur = 14;
      ctx.beginPath();
      ctx.arc(x1, y1, width * 0.7, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.restore();
    }

    function drawSkeleton(lm, W, H, hue) {
      ctx.save();
      ctx.strokeStyle = `hsla(${hue}, 80%, 65%, 0.25)`;
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      for (const [a, b] of HAND_CONNECTIONS) {
        ctx.moveTo(lm[a].x * W, lm[a].y * H);
        ctx.lineTo(lm[b].x * W, lm[b].y * H);
      }
      ctx.stroke();
      ctx.restore();
    }

    // ---- Particle spawn ----
    function spawnParticles(x, y, hue, count = 3) {
      if (!showParticles) return;
      for (let i = 0; i < count; i++) {
        if (particles.length >= MAX_PARTICLES) break;
        particles.push(new Particle(x, y, hue));
      }
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        if (particles[i].dead) particles.splice(i, 1);
      }
    }

    function drawParticles() {
      for (const p of particles) p.draw(ctx);
    }

    // ---- Snapshot ----
    function takeSnapshot() {
      const link = document.createElement('a');
      link.download = `flux-laser-${Date.now()}.png`;
      link.href = cv.toDataURL('image/png');
      link.click();
    }

    // ---- Main render loop ----
    let frameCount = 0;
    let lastFpsTime = performance.now();
    let fps = 0;
    let hands = [];
    let hues = [];

    function render() {
      const W = cv.width, H = cv.height;

      // ---- Mirror video ----
      ctx.save();
      ctx.translate(W, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0, W, H);
      ctx.restore();

      // ---- Dim ----
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.fillRect(0, 0, W, H);

      // ---- Detect hands ----
      const res = landmarker.detectForVideo(video, performance.now());
      hands = res?.landmarks || [];
      hues = hands.map(handShapeHue);

      // ---- Mirror coords ----
      const mx = (x) => (1 - x) * W;
      const my = (y) => y * H;

      // ---- Draw skeletons ----
      if (showSkeleton) {
        for (let i = 0; i < hands.length; i++) {
          drawSkeleton(hands[i], W, H, hues[i]);
        }
      }

      // ---- Laser beams (only when two hands) ----
      if (hands.length === 2) {
        const a = hands[0], b = hands[1];
        const extA = extendedFingers(a);
        const extB = extendedFingers(b);
        const hueAvg = (hues[0] + hues[1]) / 2;

        // Active tips: extended on both hands
        const activeTips = TIPS.filter(t => extA[t] && extB[t]);

        // Direct finger‑to‑finger beams
        for (let i = 0; i < activeTips.length; i++) {
          const t = activeTips[i];
          const x1 = mx(a[t].x), y1 = my(a[t].y);
          const x2 = mx(b[t].x), y2 = my(b[t].y);
          const beamHue = (hueAvg + i * 30) % 360;
          drawBeam(x1, y1, x2, y2, beamHue, 3);
          // Spawn particles at midpoint
          spawnParticles((x1+x2)/2, (y1+y2)/2, beamHue, 2);
        }

        // Cross‑weave beams (if >=3 active)
        if (activeTips.length >= 3) {
          for (const t1 of activeTips) {
            for (const t2 of activeTips) {
              if (t1 === t2) continue;
              const x1 = mx(a[t1].x), y1 = my(a[t1].y);
              const x2 = mx(b[t2].x), y2 = my(b[t2].y);
              const beamHue = (hueAvg + (t1 + t2) * 7) % 360;
              drawBeam(x1, y1, x2, y2, beamHue, 1.2, 0.45);
              if (Math.random() < 0.15) {
                spawnParticles((x1+x2)/2, (y1+y2)/2, beamHue, 1);
              }
            }
          }
        }

        // Palm‑to‑palm beam (if >=4 active)
        if (activeTips.length >= 4) {
          const x1 = mx(a[9].x), y1 = my(a[9].y);
          const x2 = mx(b[9].x), y2 = my(b[9].y);
          drawBeam(x1, y1, x2, y2, hueAvg, 5);
          spawnParticles((x1+x2)/2, (y1+y2)/2, hueAvg, 4);
        }

        // Spawn particles from fingertips
        if (showParticles) {
          for (const t of activeTips) {
            spawnParticles(mx(a[t].x), my(a[t].y), hues[0] + (t*10)%360, 1);
            spawnParticles(mx(b[t].x), my(b[t].y), hues[1] + (t*10)%360, 1);
          }
        }
      } else {
        // Prompt user
        const msg = hands.length === 1 ? "show your other hand ✋" : "show both hands to fire beams";
        ctx.save();
        const pulse = 0.65 + 0.35 * Math.sin(performance.now() / 350);
        ctx.font = `600 ${Math.round(H * 0.045)}px system-ui, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = `rgba(255,255,255,${pulse})`;
        ctx.shadowColor = 'rgba(120,200,255,0.9)';
        ctx.shadowBlur = 24;
        ctx.fillText(msg, W / 2, H * 0.12);
        ctx.restore();
      }

      // ---- Particles ----
      updateParticles();
      drawParticles();

      // ---- FPS ----
      frameCount++;
      const now = performance.now();
      if (now - lastFpsTime >= 500) {
        fps = Math.round(frameCount / ((now - lastFpsTime) / 1000));
        frameCount = 0;
        lastFpsTime = now;
        fpsEl.textContent = `FPS: ${fps}`;
      }

      requestAnimationFrame(render);
    }

    // ---- Resize ----
    function resizeCanvas() {
      if (video.videoWidth && video.videoHeight) {
        cv.width = video.videoWidth;
        cv.height = video.videoHeight;
      } else {
        cv.width = window.innerWidth;
        cv.height = window.innerHeight;
      }
    }
    window.addEventListener('resize', resizeCanvas);

    // ---- UI events ----
    beamColorSelect.addEventListener('change', (e) => {
      colorMode = e.target.value;
    });

    beamStyleSelect.addEventListener('change', (e) => {
      beamStyle = e.target.value;
    });

    toggleParticlesBtn.addEventListener('click', () => {
      showParticles = !showParticles;
      toggleParticlesBtn.classList.toggle('active', showParticles);
      if (!showParticles) particles = [];
    });

    toggleSkeletonBtn.addEventListener('click', () => {
      showSkeleton = !showSkeleton;
      toggleSkeletonBtn.classList.toggle('active', showSkeleton);
    });

    snapshotBtn.addEventListener('click', takeSnapshot);

    // ---- Initialization ----
    async function initModel() {
      const fileset = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
      );
      landmarker = await HandLandmarker.createFromOptions(fileset, {
        baseOptions: {
          modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
          delegate: "GPU"
        },
        numHands: 2,
        runningMode: "VIDEO"
      });
    }

    async function initCam() {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { width: 1280, height: 720, facingMode: "user" },
        audio: false
      });
      video.srcObject = stream;
      await video.play();
      resizeCanvas();
    }

    // ---- Start ----
    (async () => {
      try {
        await initModel();
        await initCam();
        render();
      } catch (e) {
        document.getElementById('err').style.display = 'grid';
        document.getElementById('errmsg').textContent = e.message || String(e);
        console.error(e);
      }
    })();

    console.log('MONOTONE Laser Forensics ready · dual‑hand laser beams with particles');
  </script>
</body>
</html>
